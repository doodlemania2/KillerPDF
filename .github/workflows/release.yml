name: release

# Publishes a self-contained single-file Windows x64 build of TDPdf
# whenever a tag matching v* is pushed, and attaches the .exe to a
# GitHub Release with the supplied release notes.

on:
  push:
    tags: [v*]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: tdpdf
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish (Release, win-x64, single-file, self-contained)
        run: |
          dotnet publish TDPdf.csproj \
            -c Release \
            -r win-x64 \
            --self-contained true \
            -p:EnableWindowsTargeting=true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:EnableCompressionInSingleFile=true \
            -o publish

      - name: Stage release asset
        id: asset
        run: |
          mkdir -p dist
          cp publish/TDPdf.exe "dist/TDPdf-${{ steps.tag.outputs.name }}-win-x64.exe"
          ls -la dist

      - name: Create / update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --title "TDPdf $TAG" \
              --notes-file .github/release-notes/$TAG.md \
              --target "${GITHUB_SHA}"
          fi
          gh release upload "$TAG" dist/TDPdf-${TAG}-win-x64.exe --clobber
